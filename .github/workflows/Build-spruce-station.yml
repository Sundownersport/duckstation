name: Build-spruce-station

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/duckstation/cross-build-arm64:latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Safe Directory
        run: git config --global --add safe.directory "*"

      - name: Ensure beta release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="beta-${{ github.ref_name }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Beta Build (${{ github.ref_name }})" \
              --prerelease \
              --notes "DuckStation SDL binaries built from ${{ github.ref_name }}" \
            || true

      - name: Create Binary Aliases
        run: ln -sf llvm-strip-19 /usr/bin/llvm-strip

      - name: Install SDL2 and DRM development headers (arm64)
        run: |
          # Install arm64 SDL2/libdrm/libgbm into the chroot
          dpkg --add-architecture arm64 2>/dev/null || true
          if ! grep -q "ports.ubuntu.com" /etc/apt/sources.list 2>/dev/null; then
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main universe" >> /etc/apt/sources.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main universe" >> /etc/apt/sources.list
          fi
          apt-get update -qq || true
          apt-get install -y --no-install-recommends \
            libsdl2-dev:arm64 libdrm-dev:arm64 libgbm-dev:arm64 \
            2>/dev/null || {
            echo "Multiarch install failed, extracting into chroot..."
            cd /tmp
            apt-get download \
              libsdl2-dev:arm64 libsdl2-2.0-0:arm64 \
              libdrm-dev:arm64 libdrm2:arm64 libdrm-common \
              libgbm-dev:arm64 libgbm1:arm64 \
              2>/dev/null || true
            for deb in *.deb; do
              [ -f "$deb" ] && dpkg-deb -x "$deb" /arm64-chroot/
            done
            cd -
          }

      - name: Download Dependencies
        run: |
          DEPS_VERSION=$(cat dep/PREBUILT-VERSION)
          cd dep/prebuilt
          curl --retry 5 --retry-all-errors -LO "https://github.com/duckstation/dependencies/releases/download/$DEPS_VERSION/deps-linux-cross-arm64.tar.xz"
          sha256sum --check --ignore-missing ../PREBUILT-SHA256SUMS
          tar -xf deps-linux-cross-arm64.tar.xz
          rm deps-linux-cross-arm64.tar.xz

      - name: Set Up Toolchain File
        run: |
          cp "dep/prebuilt/linux-cross-arm64/toolchain.cmake" "$HOME/toolchain.cmake"
          echo "set(CMAKE_FIND_ROOT_PATH \"$PWD/dep/prebuilt/linux-cross-arm64;/arm64-chroot\")" >> "$HOME/toolchain.cmake"
          echo "set(CMAKE_C_COMPILER clang-19)" >> "$HOME/toolchain.cmake"
          echo "set(CMAKE_C_COMPILER_AR llvm-ar-19)" >> "$HOME/toolchain.cmake"
          echo "set(CMAKE_C_COMPILER_RANLIB llvm-ranlib-19)" >> "$HOME/toolchain.cmake"
          echo "set(CMAKE_CXX_COMPILER clang++-19)" >> "$HOME/toolchain.cmake"
          echo "set(CMAKE_CXX_COMPILER_AR llvm-ar-19)" >> "$HOME/toolchain.cmake"
          echo "set(CMAKE_CXX_COMPILER_RANLIB llvm-ranlib-19)" >> "$HOME/toolchain.cmake"
          echo 'set(CMAKE_EXE_LINKER_FLAGS_INIT "-fuse-ld=lld")' >> "$HOME/toolchain.cmake"
          echo 'set(CMAKE_MODULE_LINKER_FLAGS_INIT "-fuse-ld=lld")' >> "$HOME/toolchain.cmake"
          echo 'set(CMAKE_SHARED_LINKER_FLAGS_INIT "-fuse-ld=lld")' >> "$HOME/toolchain.cmake"

      - name: Generate CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DCMAKE_TOOLCHAIN_FILE="$HOME/toolchain.cmake" \
            -DBUILD_SDL_FRONTEND=ON \
            -DENABLE_X11=OFF \
            -DENABLE_WAYLAND=OFF \
            -DENABLE_GBM=ON \
            -DHOST_MIN_PAGE_SIZE=4096 \
            -DHOST_MAX_PAGE_SIZE=16384 \
            -DHOST_CACHE_LINE_SIZE=64

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          set -e
          OUTDIR="duckstation-aarch64"
          mkdir -p "$OUTDIR/lib"

          cp build/bin/duckstation-sdl "$OUTDIR/"
          if [ -d build/bin/resources ]; then
            cp -r build/bin/resources "$OUTDIR/"
          fi

          # Collect shared library dependencies
          DEPS="dep/prebuilt/linux-cross-arm64"
          CHROOT="/arm64-chroot"
          SKIP_LIBS="linux-vdso|ld-linux|libc\.so|libm\.so|libdl\.so|libpthread\.so|librt\.so|libgcc_s|libstdc\+\+|libSDL2|libdrm|libgbm|libEGL|libGLES|libMali|libudev|libasound"

          collect_lib() {
            local lib="$1"
            [ -f "$OUTDIR/lib/$lib" ] && return
            echo "$lib" | grep -qE "$SKIP_LIBS" && return
            local src
            src=$(find "$DEPS/lib" "$CHROOT/usr/lib" "$CHROOT/lib" -maxdepth 2 -name "$lib" 2>/dev/null | head -1)
            if [ -n "$src" ]; then
              cp -L "$src" "$OUTDIR/lib/$lib"
              echo "  Collected: $lib"
            fi
          }

          echo "=== Collecting dependencies ==="
          aarch64-linux-gnu-readelf -d "$OUTDIR/duckstation-sdl" 2>/dev/null | grep NEEDED | \
            sed 's/.*\[\(.*\)\]/\1/' | while read -r lib; do collect_lib "$lib"; done

          for so in "$OUTDIR"/lib/*.so*; do
            [ -f "$so" ] || continue
            aarch64-linux-gnu-readelf -d "$so" 2>/dev/null | grep NEEDED | \
              sed 's/.*\[\(.*\)\]/\1/' | while read -r lib; do collect_lib "$lib"; done
          done

          patchelf --set-rpath '$ORIGIN/lib' "$OUTDIR/duckstation-sdl"
          for so in "$OUTDIR"/lib/*.so*; do
            [ -f "$so" ] || continue
            patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          llvm-strip "$OUTDIR/duckstation-sdl" 2>/dev/null || true
          for so in "$OUTDIR"/lib/*.so*; do
            [ -f "$so" ] || continue
            llvm-strip "$so" 2>/dev/null || true
          done

          tar -czf duckstation-aarch64.tar.gz "$OUTDIR"

          echo "=== Package contents ==="
          ls -la "$OUTDIR/"
          ls -la "$OUTDIR/lib/" 2>/dev/null || true

          echo "=== Patching glibc version requirements for 2.31 compat ==="
          python3 patch_verneed.py "$OUTDIR/duckstation-sdl"

          echo "=== glibc version check (after patch) ==="
          aarch64-linux-gnu-readelf -V "$OUTDIR/duckstation-sdl" 2>/dev/null | grep GLIBC | sort -u || true

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Install gh CLI via direct download (apt sources are polluted with arm64)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
          apt-get update -qq -o Dir::Etc::sourcelist=/etc/apt/sources.list.d/github-cli.list -o Dir::Etc::sourceparts=/dev/null
          apt-get install -y --no-install-recommends gh
          gh release upload "beta-${{ github.ref_name }}" duckstation-aarch64.tar.gz --clobber
